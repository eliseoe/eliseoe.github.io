{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <nav class="masthead__minimal" aria-label="Site">
      <a class="masthead__brand" href="{{ base_path }}/" aria-label="Home">
        <i class="fas fa-home" aria-hidden="true" style="font-size:1rem;"></i>
        <span class="masthead__brand-text">{{ site.title }}</span>
      </a>

      <div class="masthead__right">
        {% if site.author.googlescholar %}
          <a class="masthead__icon-link" href="{{ site.author.googlescholar }}" aria-label="Google Scholar">
            <i class="fas fa-graduation-cap" aria-hidden="true"></i>
          </a>
        {% endif %}
        {% if site.author.github %}
          <a class="masthead__icon-link" href="https://github.com/{{ site.author.github }}" aria-label="GitHub">
            <i class="fab fa-github" aria-hidden="true"></i>
          </a>
        {% endif %}
        {% if site.author.linkedin %}
          <a class="masthead__icon-link" href="https://www.linkedin.com/in/{{ site.author.linkedin }}/" aria-label="LinkedIn">
            <i class="fab fa-linkedin" aria-hidden="true"></i>
          </a>
        {% endif %}
        {% if site.author.email %}
          <a class="masthead__icon-link" href="mailto:{{ site.author.email }}" aria-label="Email">
            <i class="fas fa-envelope" aria-hidden="true"></i>
          </a>
        {% endif %}
      </div>
    </nav>
  </div>
</div>
